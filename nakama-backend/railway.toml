[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "/nakama/nakama migrate up --database.address $DATABASE_URL && /nakama/nakama --name nakama1 --database.address $DATABASE_URL --logger.level INFO --runtime.js_entrypoint index.js --runtime.path /nakama/data/modules --socket.server_key defaultkey --console.username admin --console.password admin --session.token_expiry_sec 7200"
healthcheckPath = "/"
restartPolicyType = "on_failure"
